apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: microservices-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - api-gateway
          - order-service
          - payment-service

  namespaceSelector:
    any: true

  endpoints:
    - port: http
      path: /metrics
      interval: 10s
