services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "5001:5000"
    depends_on:
      - order-service

  order-service:
    build: ./order-service
    ports:
      - "5002:5000"
    depends_on:
      - payment-service

  payment-service:
    build: ./payment-service
    ports:
      - "5003:5000"